name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Setup Java 17 (Required for legacy dependencies)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Java 21 (Required for modern Gradle & Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci --include=dev

    - name: Build Web App
      run: npm run build
      
    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Ensure Gradle Wrapper Jar exists
      run: |
        if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
          echo "gradle-wrapper.jar is missing! Recovering by downloading official gradle-wrapper.jar..."
          mkdir -p android/gradle/wrapper
          curl -Lo android/gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar
        else
          echo "gradle-wrapper.jar is present."
        fi

    - name: Sync Capacitor
      run: |
        echo "=== Checking built assets ==="
        ls -la dist/
        echo "=== Running Capacitor Sync ==="
        npx cap sync android

    - name: Build Android APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
