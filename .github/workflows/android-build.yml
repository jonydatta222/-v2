name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Setup Java (Java 17 & Java 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: |
          17
          21

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci --include=dev

    - name: Build Web App
      run: npm run build
      
    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Ensure Gradle Wrapper Jar exists and is valid
      run: |
        mkdir -p android/gradle/wrapper
        JAR_PATH="android/gradle/wrapper/gradle-wrapper.jar"
        
        # Function to check if a jar is valid zip/jar file
        is_valid_jar() {
          if [ -f "$JAR_PATH" ] && unzip -t "$JAR_PATH" > /dev/null 2>&1; then
            return 0
          fi
          return 1
        }

        if is_valid_jar; then
          echo "gradle-wrapper.jar is present and valid."
        else
          echo "gradle-wrapper.jar is missing, empty, or corrupt! Downloading valid jar..."
          # Download from the official Gradle repository with a verified stable tag (v8.2.0)
          curl -Lo "$JAR_PATH" https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          
          if is_valid_jar; then
            echo "Successfully downloaded valid gradle-wrapper.jar from GitHub raw."
          else
            echo "Download failed or jar still invalid! Re-trying from a backup stable tag (v8.5.0)..."
            curl -Lo "$JAR_PATH" https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
            
            if is_valid_jar; then
              echo "Successfully downloaded valid gradle-wrapper.jar from backup tag."
            else
              echo "Download failed! Generating wrapper locally using pre-installed gradle..."
              cd android
              gradle wrapper --gradle-version 8.2
              cd ..
              if is_valid_jar; then
                echo "Successfully generated valid gradle-wrapper.jar locally."
              else
                echo "Error: Failed to secure a valid gradle-wrapper.jar!"
                exit 1
              fi
            fi
          fi
        fi

    - name: Sync Capacitor
      run: |
        echo "=== Checking built assets ==="
        ls -la dist/
        echo "=== Running Capacitor Sync ==="
        npx cap sync android

    - name: Build Android APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
